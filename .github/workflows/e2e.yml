name: E2E Tests

on:
  schedule:
    # Run weekly on Mondays at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: e2e-tests
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests (Lemon Squeezy Test Mode)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          rm cloudflared.deb

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          LEMONSQUEEZY_API_KEY: ${{ secrets.LEMONSQUEEZY_API_KEY }}
          LEMONSQUEEZY_STORE_ID: ${{ secrets.LEMONSQUEEZY_STORE_ID }}
          LEMONSQUEEZY_WEBHOOK_SIGNING_SECRET: ${{ secrets.LEMONSQUEEZY_WEBHOOK_SIGNING_SECRET }}
          LEMONSQUEEZY_PRO_PRODUCT_ID: ${{ secrets.LEMONSQUEEZY_PRO_PRODUCT_ID }}
          LEMONSQUEEZY_PRO_MONTHLY_VARIANT_ID: ${{ secrets.LEMONSQUEEZY_PRO_MONTHLY_VARIANT_ID }}
          LEMONSQUEEZY_PRO_ANNUAL_VARIANT_ID: ${{ secrets.LEMONSQUEEZY_PRO_ANNUAL_VARIANT_ID }}
          LEMONSQUEEZY_MAX_PRODUCT_ID: ${{ secrets.LEMONSQUEEZY_MAX_PRODUCT_ID }}
          LEMONSQUEEZY_MAX_MONTHLY_VARIANT_ID: ${{ secrets.LEMONSQUEEZY_MAX_MONTHLY_VARIANT_ID }}
          LEMONSQUEEZY_MAX_ANNUAL_VARIANT_ID: ${{ secrets.LEMONSQUEEZY_MAX_ANNUAL_VARIANT_ID }}
          E2E_HEADLESS: "true"

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-screenshots
          path: e2e/screenshots/
          retention-days: 14
          if-no-files-found: ignore
